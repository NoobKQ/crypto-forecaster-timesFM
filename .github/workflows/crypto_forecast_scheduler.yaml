name: Crypto Forecast

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC (new daily candle open)
  workflow_dispatch:       # manual trigger from GitHub Actions tab

jobs:
  forecast:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast (BTC-USD ETH-USD SOL-USD 1h 24) (period 30d)
        run: python main.py --coins BTC-USD,ETH-USD,SOL-USD --period 30d --interval 1h --horizon 24
      
      - name: Run forecast (BTC-USD ETH-USD SOL-USD 1h 24) (period 60d)
        run: python main.py --coins BTC-USD,ETH-USD,SOL-USD --period 60d --interval 1h --horizon 24
      
      - name: Run forecast (BTC-USD ETH-USD SOL-USD 4h 6)
        run: python main.py --coins BTC-USD,ETH-USD,SOL-USD --period 30d --interval 4h --horizon 6

      - name: Commit updated log files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Update forecast log [skip ci]"
          git push